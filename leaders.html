<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Лидеры</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <nav class="main-nav">
        <a href="index.html">🏠 Главная</a>
        <a href="login.html">🔐 Вход</a>
        <a href="leaders.html">🏆 Лидеры</a>
    </nav>

    <div id="app">
        <h2>Таблица лидеров</h2>
        <input type="text" v-model="searchQuery" placeholder="🔍 Поиск по имени" class="search-input">
        <table>
            <thead>
                <tr><th>Место</th><th>Имя</th><th>Очки</th></tr>
            </thead>
            <tbody>
                <tr v-for="(player, index) in filteredPlayers">
                    <td>{{ index + 1 }}</td>
                    <td>{{ player.name }}</td>
                    <td>{{ player.score }}</td>
                </tr>
                <tr v-if="filteredPlayers.length === 0">
                    <td colspan="3" style="text-align: center;">Игроки не найдены</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;
        createApp({
            setup() {
                const players = ref([
                    { name: 'Алексей', score: 1250 },
                    { name: 'Мария', score: 1180 },
                    { name: 'Дмитрий', score: 990 },
                    { name: 'Екатерина', score: 875 }
                ]);
                const searchQuery = ref('');

                const sortedPlayers = computed(() => {
                    return [...players.value].sort((a, b) => b.score - a.score);
                });

                const filteredPlayers = computed(() => {
                    if (!searchQuery.value.trim()) return sortedPlayers.value;
                    const query = searchQuery.value.toLowerCase();
                    return sortedPlayers.value.filter(p => p.name.toLowerCase().includes(query));
                });

                return { players, searchQuery, filteredPlayers };
            }
        }).mount('#app');
    </script>
</body>
</html>
